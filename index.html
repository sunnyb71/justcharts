<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Just Charts</title>
  <link rel="stylesheet" href="style.css" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YM26B3D58W"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-YM26B3D58W');
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <div class="container">

    <!-- ── Top bar: title + all controls in one row ── -->
    <div class="top-bar">
      <div class="top-bar__title">
        <h1>Just Charts</h1>
        <span class="subtitle">Up to 50 stocks</span>
      </div>

      <div class="top-bar__controls">
        <!-- Range -->
        <div class="btn-group">
          <button class="range-btn" data-range="1d">1D</button>
          <button class="range-btn" data-range="5d">5D</button>
          <button class="range-btn active" data-range="1mo">1M</button>
          <button class="range-btn" data-range="3mo">3M</button>
          <button class="range-btn" data-range="6mo">6M</button>
          <button class="range-btn" data-range="1y">1Y</button>
          <button class="range-btn" data-range="3y">3Y</button>
          <button class="range-btn" data-range="5y">5Y</button>
        </div>

        <!-- Chart size -->
        <div class="btn-group">
          <button class="size-btn" data-size="S">S</button>
          <button class="size-btn active" data-size="M">M</button>
          <button class="size-btn" data-size="L">L</button>
          <button class="size-btn" data-size="XL">XL</button>
        </div>

        <!-- Extra controls -->
        <div class="btn-group">
          <button type="button" id="toggle-comparison-btn" onclick="toggleComparison()" style="display:none">Show Comparison</button>
          <button type="button" id="sort-btn" onclick="sortByRank()" style="display:none">Sort by Rank</button>
          <button type="button" id="share-btn" onclick="shareURL()">Share</button>
          <button type="button" id="theme-btn" onclick="toggleTheme()">Dark</button>
          <button type="button" id="auth-btn" onclick="openAuthModal()">Login</button>
        </div>

      </div>
    </div>

    <!-- ── Quote ── -->
    <div id="quote-bar"></div>

    <!-- ── Watchlists ── -->
    <div class="watchlist-bar">
      <span class="watchlist-label">Watchlists</span>
      <div id="watchlist-pills"></div>
      <button id="watchlist-save-btn">+ Save</button>
      <input id="watchlist-name-input" class="watchlist-name-input" type="text" placeholder="Name..." maxlength="30" style="display:none" />
    </div>

    <!-- ── Ticker input grid ── -->
    <div class="ticker-section">
      <div id="ticker-inputs"></div>
      <button id="add-btn" onclick="addRow()">+ Add</button>
      <button id="show-btn" onclick="compareStocks()">Show</button>
    </div>

    <!-- ── Status ── -->
    <p id="error-msg" class="error" style="display:none"></p>
    <p id="loading-msg" class="loading-msg" style="display:none">⏳ Loading...</p>

    <!-- ── Comparison chart ── -->
    <div id="chart-wrap" style="display:none">
      <canvas id="chart"></canvas>
    </div>

    <!-- ── Individual charts ── -->
    <div id="individual-charts"></div>

  </div>

  <!-- ── Auth modal ── -->
  <div id="auth-modal-overlay" class="modal-overlay" style="display:none" onclick="closeAuthModal(event)">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Authentication">
      <div class="modal-tabs" id="auth-tabs">
        <button type="button" class="modal-tab active" id="tab-login" onclick="switchTab('login')">Log in</button>
        <button type="button" class="modal-tab" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>
      <div class="modal-body">

        <!-- Login / Register view -->
        <div id="auth-view">
          <input id="auth-username" class="modal-input" type="text" placeholder="Username" autocomplete="username" />
          <input id="auth-password" class="modal-input" type="password" placeholder="Password" autocomplete="current-password" maxlength="100" />
          <p id="auth-error" class="modal-error" style="display:none"></p>
          <button id="auth-submit-btn" class="modal-submit" onclick="submitAuth()">Log in</button>
          <button type="button" class="modal-text-btn" id="forgot-link-btn" onclick="switchTab('forgot')" style="display:none">Forgot password?</button>
        </div>

        <!-- Forgot password view -->
        <div id="forgot-view" style="display:none">
          <p class="modal-hint">Enter your username to get a reset link.</p>
          <input id="forgot-username" class="modal-input" type="text" placeholder="Username" autocomplete="username" />
          <p id="forgot-error" class="modal-error" style="display:none"></p>
          <div id="forgot-result" style="display:none">
            <p class="modal-hint">Your reset link (valid 1 hour):</p>
            <a id="forgot-reset-link" class="modal-reset-link" href="#"></a>
          </div>
          <button type="button" class="modal-submit" onclick="submitForgot()">Get reset link</button>
          <button type="button" class="modal-text-btn" onclick="switchTab('login')">← Back to login</button>
        </div>

        <!-- Reset password view -->
        <div id="reset-view" style="display:none">
          <p class="modal-hint">Enter a new password for your account.</p>
          <input id="reset-password" class="modal-input" type="password" placeholder="New password (min 6 chars)" autocomplete="new-password" maxlength="100" />
          <p id="reset-error" class="modal-error" style="display:none"></p>
          <button type="button" class="modal-submit" onclick="submitReset()">Set new password</button>
        </div>

      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
