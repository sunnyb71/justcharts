services:
  - type: web
    name: just-charts
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: just-charts-db
          property: connectionString

databases:
  - name: just-charts-db
    databaseName: justcharts
    user: justcharts
